<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Shop - Checkout</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/cart.css">
  <link rel="stylesheet" href="styles/checkout.css">
</head>
<body>
  <header>
    <h1 onclick="location.href='index.html'" style="cursor:pointer">My Shop</h1>
    <nav id="desktopNav">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="cart.html">Your Cart</a>
    </nav>
    <button class="mobile-nav-trigger" id="burgerBtn" aria-label="Open menu">
      <span class="burger-icon"></span>
    </button>
  </header>

  <div class="drawer-overlay" id="menuOverlay"></div>
  <aside class="mobile-drawer" id="mobileDrawer"></aside>

  <div class="container checkout-container">
    <h2>Secure Checkout</h2>
    <form class="checkout-form" id="checkoutForm" novalidate>
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe">
        <span class="error-message" id="nameError"></span>
      </div>
                  
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com">
        <span class="error-message" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="address">Shipping Address</label>
        <input type="text" id="address" placeholder="123 Main St, Apt 4B">
        <span class="error-message" id="addressError"></span>
      </div>

      <div class="form-group">
        <label for="cardNumber">Card Number (Mock)</label>
        <input type="text" id="cardNumber" inputmode="numeric" maxlength="19" placeholder="1234 5678 1234 5678">
        <span class="error-message" id="cardError"></span>
      </div>

      <button type="submit" class="submit-btn">Place Order</button>
    </form>
  </div>
  <div id="cartToast" class="toast-notification" aria-live="polite">
    <span class="toast-icon">✓</span>
    <span id="toastMessage">Order processed!</span>
  </div>

  <script src="app.js"></script>
  <script src="nav.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
